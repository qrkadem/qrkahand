name: Build Linux ELF

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux-elf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build ELF with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --name qrkahand --collect-all cv2 --collect-all cvzone --collect-all mediapipe --collect-all pyautogui mouse.py

      - name: Ensure executable bit
        run: chmod +x dist/qrkahand

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: qrkahand-linux-elf
          path: dist/qrkahand
          if-no-files-found: error
