name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name qrkahand --collect-all cv2 --collect-all cvzone --collect-all mediapipe --collect-all pyautogui mouse.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qrkahand-windows-exe
          path: dist/qrkahand.exe
          if-no-files-found: error
